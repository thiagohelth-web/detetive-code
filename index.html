<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DETETIVE CODE - OFICIAL</title>
    <style>
        :root {
            --primary: #00ff41; 
            --bg: #0a0a0a;
            --card: #151515;
            --text: #e0e0e0;
            --accent: #008f11;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 20px;
        }

        #app-container {
            width: 100%;
            max-width: 550px;
            background: var(--card);
            border: 1px solid #333;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .header {
            text-align: center;
            border-bottom: 1px solid var(--accent);
            margin-bottom: 25px;
            padding-bottom: 15px;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .progress-bg {
            width: 100%;
            height: 6px;
            background: #222;
            border-radius: 10px;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--primary));
            width: 0%;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .narrative {
            background: rgba(0, 255, 65, 0.05);
            padding: 15px;
            border-radius: 8px;
            border-left: 3px solid var(--primary);
            margin-bottom: 25px;
            font-style: italic;
            line-height: 1.6;
        }

        .question-box { font-size: 1.15rem; font-weight: 500; margin-bottom: 25px; color: #fff; }

        .options-grid { display: grid; gap: 12px; }

        .opt-btn {
            background: #222;
            color: #ccc;
            border: 1px solid #444;
            padding: 16px;
            border-radius: 10px;
            text-align: left;
            cursor: pointer;
            transition: 0.2s;
            font-size: 1rem;
        }

        .opt-btn:hover {
            border-color: var(--primary);
            background: #1a1a1a;
            color: var(--primary);
        }

        #feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
            font-weight: 600;
            text-align: center;
        }

        .next-btn {
            display: none;
            width: 100%;
            background: var(--primary);
            color: #000;
            border: none;
            padding: 18px;
            border-radius: 10px;
            font-weight: 800;
            margin-top: 20px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .start-screen { text-align: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="intro">
        <div class="header">
            <h1 style="color: var(--primary); margin: 0; font-size: 1.8rem;">DETETIVE CODE</h1>
            <p style="font-size: 0.9rem; color: #888;">Módulo de Simulação Pericial</p>
        </div>
        <div class="narrative">
            "Aqui é o <strong>Delegado Sabiá</strong>. O túnel foi localizado sob a loja de carpetes. 
            Não sabemos quem são os alvos ainda. Sua missão é conduzir a perícia técnica do passo 1 ao 100. 
            Um erro pode contaminar a prova. Está pronto, Detetive?"
        </div>
        <button class="next-btn" style="display: block;" onclick="start()">INICIAR OPERAÇÃO</button>
    </div>

    <div id="game" class="hidden">
        <div class="status-bar">
            <span id="step-txt">Passo 1/100</span>
            <span>Agente: Detetive</span>
        </div>
        <div class="progress-bg"><div id="progress-fill"></div></div>
        
        <div id="content" style="margin-top: 25px;">
            <div class="question-box" id="q-text"></div>
            <div class="options-grid" id="opts"></div>
            <div id="feedback"></div>
            <button id="btn-next" class="next-btn" onclick="next()">PRÓXIMO PASSO</button>
        </div>
    </div>
</div>

<script>
    // BANCO DE DADOS - ADICIONE SUAS PERGUNTAS AQUI
    const db = [
        {
            q: "Você chega à entrada do túnel. Há sacos de areia e pó branco. Qual o primeiro protocolo?",
            options: ["Isolar a área e fotografar com escala métrica", "Coletar o pó com as mãos", "Varrer para facilitar a passagem"],
            correct: 0,
            rat: "Correto! A preservação do local é o pilar da perícia criminal."
        },
        {
            q: "Identificado giz azul nas vigas. O que isso representa no Modus Operandi?",
            options: ["Marcação de engenharia da quadrilha", "Apenas sujeira comum", "Sinal de que a polícia já esteve lá"],
            correct: 0,
            rat: "Exato! Indica planejamento e divisão de tarefas dos criminosos."
        },
        {
            q: "Cabos elétricos expostos no túnel. Risco ocupacional principal?",
            options: ["Risco de Choque Elétrico (NR-10)", "Risco Biológico", "Risco Ergonômico"],
            correct: 0,
            rat: "Correto! A segurança do perito (Biossegurança) vem sempre em primeiro lugar."
        },
        {
            q: "Passo 04: Encontrada uma lanterna ligada. Como coletar?",
            options: ["Fotografar na posição e estado atual antes de coletar", "Desligar imediatamente para poupar pilha", "Chutar para o lado"],
            correct: 0,
            rat: "Perfeito! O estado dos objetos revela a cronologia do crime."
        },
        // --- ADICIONE OS PASSOS DE 5 A 99 SEGUINDO O MODELO ACIMA ---
        {
            q: "PASSO 100: Missão cumprida. Qual a peça técnica final que você entrega ao Delegado Sabiá?",
            options: ["Laudo Pericial de Local de Crime", "Um resumo por WhatsApp", "Um depoimento por voz"],
            correct: 0,
            rat: "Missão Finalizada! O Laudo é a prova material que encerra o caso."
        }
    ];

    let current = 0;

    function start() {
        document.getElementById('intro').classList.add('hidden');
        document.getElementById('game').classList.remove('hidden');
        render();
    }

    function render() {
        const data = db[current];
        document.getElementById('q-text').innerText = data.q;
        document.getElementById('step-txt').innerText = `Passo ${current + 1}/100`;
        document.getElementById('progress-fill').style.width = (current + 1) + "%";
        
        const container = document.getElementById('opts');
        container.innerHTML = '';
        
        data.options.forEach((txt, i) => {
            const b = document.createElement('button');
            b.className = 'opt-btn';
            b.innerText = txt;
            b.onclick = () => check(i);
            container.appendChild(b);
        });

        document.getElementById('feedback').style.display = 'none';
        document.getElementById('btn-next').style.display = 'none';
    }

    function check(idx) {
        const data = db[current];
        const f = document.getElementById('feedback');
        f.style.display = 'block';
        
        if(idx === data.correct) {
            f.style.color = '#00ff41';
            f.innerHTML = "✅ ACERTO: " + data.rat;
            document.getElementById('btn-next').style.display = 'block';
        } else {
            f.style.color = '#ff4b4b';
            f.innerHTML = "❌ ERRO: Procedimento incorreto. Reavalie a cena.";
        }
    }

    function next() {
        current++;
        if(current < db.length) render();
        else {
            alert("CASO ENCERRADO! 100% CONCLUÍDO.");
            location.reload();
        }
    }
</script>
</body>
</html>
