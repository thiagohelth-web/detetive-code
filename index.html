<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DETETIVE CODE: MISTÉRIO DO TÚNEL</title>
    <style>
        :root { --primary: #00ff41; --bg: #0d0d0d; --card: #1a1a1a; --text: #f0f0f0; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Courier New', Courier, monospace; margin: 0; display: flex; justify-content: center; padding: 20px; }
        #app-container { width: 100%; max-width: 600px; background: var(--card); border: 2px solid var(--primary); border-radius: 10px; padding: 25px; box-shadow: 0 0 20px rgba(0,255,65,0.4); }
        .header { text-align: center; border-bottom: 1px solid var(--primary); margin-bottom: 20px; padding-bottom: 10px; color: var(--primary); text-shadow: 0 0 10px var(--primary); }
        .progress-bg { width: 100%; height: 12px; background: #333; border-radius: 6px; margin-bottom: 20px; overflow: hidden; border: 1px solid #444; }
        #progress-fill { height: 100%; background: var(--primary); width: 0%; transition: 0.5s; box-shadow: 0 0 10px var(--primary); }
        .narrative { background: #000; padding: 15px; border-left: 4px solid var(--primary); margin-bottom: 20px; font-size: 1.1rem; line-height: 1.5; min-height: 100px; }
        .options-grid { display: grid; gap: 12px; }
        .opt-btn { background: #222; color: #fff; border: 1px solid #444; padding: 15px; border-radius: 5px; cursor: pointer; text-align: left; font-size: 1rem; transition: 0.2s; }
        .opt-btn:hover { border-color: var(--primary); background: #111; color: var(--primary); }
        #feedback { margin-top: 15px; padding: 15px; border-radius: 5px; display: none; text-align: center; font-weight: bold; font-size: 1.1rem; border: 1px solid; }
        .next-btn { width: 100%; background: var(--primary); color: #000; border: none; padding: 18px; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 20px; display: none; font-size: 1.1rem; text-transform: uppercase; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="intro">
        <div class="header"><h1>DETETIVE CODE</h1></div>
        <div class="narrative">
            "Atenção equipe! O banco central notificou uma queda de pressão no solo. A pista nos trouxe a esta loja de carpetes vazia. O ar cheira a terra fresca e óleo de máquina. Precisamos achar o acesso ao túnel antes que eles fujam com o dinheiro."
        </div>
        <button class="next-btn" style="display: block;" onclick="startGame()">INICIAR INVESTIGAÇÃO</button>
    </div>

    <div id="game-screen" class="hidden">
        <div style="display:flex; justify-content:space-between; color:var(--primary); font-size:0.8rem; margin-bottom:5px;">
            <span id="step-txt">PISTA 1/10</span>
            <span>CASO: ASSALTO AO COFRE</span>
        </div>
        <div class="progress-bg"><div id="progress-fill"></div></div>
        <div id="narrative-display" class="narrative"></div>
        <div id="options-container" class="options-grid"></div>
        <div id="feedback"></div>
        <button id="btn-next" class="next-btn" onclick="nextQuestion()">PRÓXIMA PISTA ➔</button>
    </div>
</div>

<script>
    const db = [
        // SETOR 2: A ANTE-SALA E O INFORMANTE (11-20)
        { 
            n: "A porta cede! Vocês estão em uma sala improvisada com monitores e ferramentas. Na mesa, há um crachá do banco com a foto raspada.", 
            q: "O que vocês investigam primeiro?", 
            opts: ["Os monitores de vídeo", "O crachá danificado", "As ferramentas de corte"], 
            correct: 1, 
            rat: "Usando luz forense, vocês recuperam o nome: 'Roberto, Gerente de Operações'. Temos um suspeito!" 
        },
        { 
            n: "Um dos monitores está ligado e mostra o corredor interno do banco. O sensor de movimento está apitando em intervalos de 5 segundos.", 
            q: "O que isso significa?", 
            opts: ["O sistema está quebrado", "Alguém está atravessando o corredor agora", "É apenas um alarme falso"], 
            correct: 1, 
            rat: "Exato! Um dos bandidos ainda está lá dentro. Movam-se com cautela!" 
        },
        { 
            n: "No canto da sala, vocês encontram o par do 'sapato social caro'. Dentro dele, há um recibo de estacionamento do Shopping da cidade.", 
            q: "Como essa pista ajuda?", 
            opts: ["Não ajuda em nada", "Dá a placa do carro usado pelo líder", "Serve apenas para ver o horário"], 
            correct: 1, 
            rat: "No verso do recibo está anotado: 'Vectra Cinza - KLY-2026'. O carro da fuga!" 
        },
        { 
            n: "Há um colete balístico jogado no chão com o logotipo de uma empresa de segurança privada.", 
            q: "Qual a dedução do grupo?", 
            opts: ["Os bandidos compraram no mercado negro", "A gangue tem apoio de seguranças reais", "O colete é de brinquedo"], 
            correct: 1, 
            rat: "A investigação se aprofunda: a segurança do banco pode estar comprometida!" 
        },
        { 
            n: "Vocês ouvem passos vindo de cima. É o teto do túnel. Os bandidos criaram uma saída de emergência para o bueiro da rua.", 
            q: "Qual a estratégia da equipe?", 
            opts: ["Subir e perseguir", "Ficar na sala e montar uma emboscada", "Gritar para eles pararem"], 
            correct: 1, 
            rat: "Posições tomadas! Se eles voltarem para buscar o dinheiro, estarão cercados." 
        },
        { 
            n: "Um celular começa a vibrar dentro de uma caixa de ferramentas. O nome no visor é 'O TOUPEIRA'.", 
            q: "O que fazer?", 
            opts: ["Atender e ficar calado", "Deixar tocar e rastrear o sinal", "Desligar o aparelho"], 
            correct: 1, 
            rat: "O rastreio indica que o líder está a menos de 500 metros daqui, na superfície!" 
        },
        { 
            n: "Na parede, há um mapa do cofre com um X gigante no duto de ventilação. Eles planejam injetar algo lá.", 
            q: "O que seria mais provável?", 
            opts: ["Água para inundar", "Gás sonífero para apagar os guardas", "Fumaça para esconder a fuga"], 
            correct: 1, 
            rat: "Isso explica por que os guardas do turno da noite não responderam ao rádio." 
        },
        { 
            n: "Vocês encontram uma maleta trancada com senha. O adesivo nela diz: 'Propriedade do Setor de TI'.", 
            q: "Como abrir?", 
            opts: ["Usar a força", "Tentar a data do assalto (hoje)", "Procurar a senha nos monitores ao redor"], 
            correct: 2, 
            rat: "A senha estava colada embaixo do teclado: 'Admin123'. Dentro há um notebook com o esquema dos alarmes." 
        },
        { 
            n: "O notebook revela que o alarme principal foi desativado manualmente às 22:00 por um código de supervisor.", 
            q: "Isso confirma o quê?", 
            opts: ["Que o sistema falhou sozinho", "Que o 'Roberto' (Gerente) é cúmplice direto", "Que os bandidos são hackers"], 
            correct: 1, 
            rat: "Cadeia de evidências completa: Roberto facilitou a entrada!" 
        },
        { 
            n: "FIM DO SETOR 2: Um estrondo vem da parede final. O cofre foi rompido! Poeira e luz branca invadem a sala.", 
            q: "Ação final deste setor:", 
            opts: ["Entrar no cofre para o confronto final", "Recuar e chamar reforços", "Esperar a poeira baixar"], 
            correct: 0, 
            rat: "Armas em punho! Vocês estão cara a cara com o crime. O confronto final começou!" 
        }
    ];

    let current = 0;

    function startGame() {
        document.getElementById('intro').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        render();
    }

    function render() {
        const data = db[current];
        document.getElementById('step-txt').innerText = "PISTA " + (current + 1) + "/10";
        document.getElementById('progress-fill').style.width = ((current + 1) / db.length * 100) + "%";
        document.getElementById('narrative-display').innerText = data.n + "\n\n" + data.q;
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        data.opts.forEach((txt, i) => {
            const b = document.createElement('button');
            b.className = 'opt-btn';
            b.innerText = txt;
            b.onclick = () => check(i);
            container.appendChild(b);
        });

        document.getElementById('feedback').style.display = 'none';
        document.getElementById('btn-next').style.display = 'none';
    }

    function check(i) {
        const data = db[current];
        const f = document.getElementById('feedback');
        f.style.display = 'block';
        if(i === data.correct) {
            f.style.color = "#00ff41";
            f.style.borderColor = "#00ff41";
            f.innerHTML = "🎯 PISTA CONFIRMADA: " + data.rat;
            document.getElementById('btn-next').style.display = 'block';
        } else {
            f.style.color = "#ff4b4b";
            f.style.borderColor = "#ff4b4b";
            f.innerHTML = "❌ PISTA FALSA! Tentem analisar os vestígios novamente.";
        }
    }

    function nextQuestion() {
        current++;
        if(current < db.length) {
            render();
        } else {
            document.getElementById('app-container').innerHTML = `
                <div class="header"><h1>SETOR 1 CONCLUÍDO!</h1></div>
                <p style="text-align:center">Vocês invadiram a ante-sala. O caso está esquentando!</p>
                <p style="color:#00ff41; text-align:center"><strong>Me peça os próximos 10 passos (11 ao 20) agora!</strong></p>
                <button class="opt-btn" style="width:100%; text-align:center" onclick="location.reload()">REINICIAR</button>
            `;
        }
    }
</script>
</body>
</html>
